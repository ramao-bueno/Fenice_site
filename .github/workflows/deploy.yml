name: Deploy Fenice bRain → fenicejus.fenice.ia.br

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site (Quartz)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout vault (Fenice_brain)
        uses: actions/checkout@v4
        with:
          repository: ramao-bueno/Fenice_brain
          path: content
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npx quartz build -d content

      - name: Add CNAME
        run: echo "fenicejus.fenice.ia.br" > public/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
